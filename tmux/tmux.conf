# Premium Tmux Configuration (Catppuccin)
set -g default-shell /usr/bin/fish

# Enable mouse support
set -g mouse on

# Vi-mode keys
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# Fix colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Tmux2k Configuration
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-bg-color 'default'
set -g status-bg default
set -g @tmux2k-right-plugins "cpu ram network time"
set -g @tmux2k-show-powerline true

# Minimalist session and window style
set -g @tmux2k-window-list-alignment 'left'
set -g @tmux2k-compact-windows true

# Pane resizing (Prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind n next-window
bind p previous-window

# Synchronize panes toggle
bind y set-window-option synchronize-panes

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Plugins
# Plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'Peter-McKinney/tmux-open-file-nvim'
set -g @plugin '2kabhishek/tmux2k'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)


run '~/.tmux/plugins/tpm/tpm'
set -g default-shell /usr/bin/fish

[general]
# Catppuccin Mocha colors
import = []

[window]
padding = { x = 12, y = 12 }
dynamic_padding = true
opacity = 0.55
blur = true
decorations = "None"

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[colors.primary]
background = "#1e1e2e"
foreground = "#a6adc8"

[colors.normal]
black = "#45475a"
red = "#e78284"
green = "#a6e3a1"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
white = "#b5bfe2"

[colors.bright]
black = "#51576d"
red = "#e78284"
green = "#a6e3a1"
yellow = "#e5c890"
blue = "#8caaee"
magenta = "#f4b8e4"
cyan = "#81c8be"
white = "#a5adce"

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 750

[terminal.shell]
program = "/usr/bin/tmux"

[env]
TERM = "alacritty"

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sway Liviano Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-dark: #0b0e14;
            --panel-bg: rgba(15, 17, 26, 0.95);
            --accent: #7aa2f7;
            --border: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(25px);
        }

        html,
        body {
            background: #0b0e14 !important;
            font-family: 'Inter', sans-serif;
            color: #a9b1d6;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            height: 100%;
        }

        .tab-content {
            display: none;
            height: 100%;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="flex items-stretch justify-start">

    <main class="w-full glass flex flex-col shadow-2xl">
        <!-- TABS HEADER -->
        <div class="flex h-14 border-b border-white/5">
            <button onclick="setTab('ai')" id="tab-btn-ai"
                class="flex-1 flex flex-col items-center justify-center space-y-1 text-[9px] font-bold tracking-tighter border-b-2 border-accent bg-white/5 transition">
                <i class="fa-solid fa-brain text-xs"></i> <span>IA AI</span>
            </button>
            <button onclick="setTab('trans')" id="tab-btn-trans"
                class="flex-1 flex flex-col items-center justify-center space-y-1 text-[9px] font-bold tracking-tighter border-b-2 border-transparent hover:bg-white/5 transition">
                <i class="fa-solid fa-language text-xs"></i> <span>TRADUC</span>
            </button>
        </div>

        <div class="flex-1 p-6 overflow-hidden">
            <!-- AI Panel -->
            <div id="panel-ai" class="tab-content active">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-accent">Gemini Assistant</span>
                </div>
                <div id="ai-chat" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2 scrollbar-hide">
                    <div class="text-gray-400 bg-white/5 p-4 rounded-xl border border-white/5 text-xs leading-relaxed">
                        Sistema iniciado. Soy tu asistente inteligente integrado. ¿En qué puedo ayudarte?
                    </div>
                </div>
                <div class="relative bg-black/40 border border-white/10 rounded-xl p-1">
                    <textarea id="ai-query" rows="2" placeholder="Escribe tu consulta..."
                        class="w-full bg-transparent border-none text-xs p-3 outline-none resize-none"></textarea>
                    <button onclick="sendToAI()"
                        class="absolute right-3 bottom-3 text-accent hover:scale-110 transition"><i
                            class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <!-- Translator Panel -->
            <div id="panel-trans" class="tab-content">
                <div
                    class="flex items-center justify-between mb-6 text-[10px] font-bold opacity-30 uppercase tracking-widest">
                    <span>Español</span> <i class="fa-solid fa-arrow-right-long text-accent"></i> <span>Inglés</span>
                </div>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-1">ENTRADA</label>
                        <textarea
                            class="w-full h-32 bg-black/40 border border-white/10 rounded-xl p-4 text-xs outline-none focus:border-accent/50 resize-none"
                            placeholder="Texto a traducir..."></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold opacity-40 ml-1">TRADUCCIÓN</label>
                        <div
                            class="w-full h-32 bg-white/5 border border-white/5 rounded-xl p-4 text-xs text-gray-500 italic">
                            ...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function setTab(tab) {
            const tabs = ['ai', 'trans'];
            tabs.forEach(t => {
                const panel = document.getElementById(`panel-${t}`);
                const btn = document.getElementById(`tab-btn-${t}`);
                if (panel) panel.classList.remove('active');
                if (btn) {
                    btn.classList.remove('border-accent', 'bg-white/5');
                    btn.classList.add('border-transparent');
                }
            });

            const activePanel = document.getElementById(`panel-${tab}`);
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            if (activePanel) activePanel.classList.add('active');
            if (activeBtn) {
                activeBtn.classList.add('border-accent', 'bg-white/5');
                activeBtn.classList.remove('border-transparent');
            }
        }

        async function sendToAI() {
            const input = document.getElementById('ai-query');
            const chat = document.getElementById('ai-chat');
            const text = input.value.trim();
            if (!text) return;

            const userDiv = document.createElement('div');
            userDiv.className = "flex flex-col items-end space-y-1 mb-4";
            userDiv.innerHTML = `<span class="text-[8px] font-bold opacity-40 uppercase">Tú</span><div class="bg-accent/10 text-white text-[11px] p-3 rounded-xl rounded-tr-none border border-accent/20">${text}</div>`;
            chat.appendChild(userDiv);
            input.value = "";

            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = "flex flex-col items-start space-y-1 mb-4";
                aiDiv.innerHTML = `<span class="text-[8px] font-bold opacity-40 uppercase text-accent">AI</span><div class="bg-white/5 text-gray-300 text-[11px] p-3 rounded-xl rounded-tl-none border border-white/10">Analizando... El núcleo del sistema responde correctamente.</div>`;
                chat.appendChild(aiDiv);
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }

        document.getElementById('ai-query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendToAI();
            }
        });

        // Close on Escape key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.close();
            }
        });
    </script>
</body>

</html>
